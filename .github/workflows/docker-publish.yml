name: Docker — Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          # Foundry-pattern services that are wired into the apps
          # helm charts and ship as Docker images. The matrix was
          # rebuilt by FASE 9 / Tarea 9.4 — the previous entries
          # (`gateway`, `auth-service`, `dataset-service`,
          # `pipeline-service`, `ontology-service`) referenced
          # legacy service names that never had Dockerfiles in
          # services/ and silently failed every push.
          # S8 / ADR-0030: approvals-service merged → workflow-automation-service.
          # S8 / ADR-0030: automation-operations-service merged → workflow-automation-service.
          - audit-compliance-service
          # S8 / ADR-0030: data-asset-catalog-service merged → dataset-versioning-service.
          - dataset-versioning-service
          - edge-gateway-service
          - iceberg-catalog-service
          - identity-federation-service
          - ontology-actions-service
          - ontology-definition-service
          - ontology-indexer
          # S8 / ADR-0030: pipeline-authoring-service and
          # pipeline-schedule-service merged → pipeline-build-service.
          - pipeline-build-service
          - pipeline-runner
          - reindex-coordinator-service
          - sql-bi-gateway-service
          - workflow-automation-service
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - name: Assert service Dockerfile exists
        run: test -f "services/${{ matrix.service }}/Dockerfile"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
