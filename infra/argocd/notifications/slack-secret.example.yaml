# Argo CD Notifications — Slack credentials.
#
# Copy this file to `slack-secret.yaml`, populate `slack-token` with a
# Slack OAuth token (xoxb-…) or webhook URL, and apply it manually:
#
#   kubectl -n argocd apply -f infra/argocd/notifications/slack-secret.yaml
#
# Notifications are wired to read `$slack-token` from this Secret (see
# the `notifiers.service.slack` block in argocd-helm-values.yaml).
# Until this Secret has a real token, sync-failure notifications are
# silently dropped — no errors, no friction.
#
# DO NOT COMMIT slack-secret.yaml. It is in .gitignore.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
type: Opaque
stringData:
  slack-token: "REPLACE_ME_with_xoxb_token_or_webhook"
