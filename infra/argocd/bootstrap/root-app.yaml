# Root "app-of-apps" Application.
#
# This is the only Application created during bootstrap (besides the
# self-managed argocd Application). It points at infra/argocd/apps/<env>
# in this repository. Every other Application — operators, infra, apps —
# is generated by the ApplicationSets that live under that path.
#
# The bootstrap script substitutes ${OPENFOUNDRY_ENV},
# ${OPENFOUNDRY_GITOPS_REPO} and ${OPENFOUNDRY_GITOPS_REVISION} when it
# applies this file. After the first apply, ArgoCD self-reconciles the
# resource directly from Git so subsequent edits to the file in Git
# (env switch, repo move) take effect on the next sync.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openfoundry-root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openfoundry
  source:
    repoURL: ${OPENFOUNDRY_GITOPS_REPO}
    targetRevision: ${OPENFOUNDRY_GITOPS_REVISION}
    path: infra/argocd/apps/${OPENFOUNDRY_ENV}
    directory:
      recurse: false
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
